name: Auto Update

on:
  schedule:
    - cron: '0 */6 * * *'  # Every 6 hours
  workflow_dispatch:      # Manual trigger

jobs:
  update:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4

      - name: Install Nix
        uses: cachix/install-nix-action@v27
        with:
          extra_nix_config: |
            experimental-features = nix-command flakes

      - name: Check for GUI updates
        id: gui
        run: |
          API_RESPONSE=$(curl -sL "https://www.cursor.com/api/download?platform=linux-x64&releaseTrack=stable")
          VERSION=$(echo "$API_RESPONSE" | jq -r '.version')
          COMMIT_SHA=$(echo "$API_RESPONSE" | jq -r '.commitSha')
          DEB_URL=$(echo "$API_RESPONSE" | jq -r '.debUrl')

          CURRENT=$(grep 'version = ' package.nix | head -1 | sed 's/.*"\(.*\)".*/\1/')

          echo "current=$CURRENT" >> $GITHUB_OUTPUT
          echo "latest=$VERSION" >> $GITHUB_OUTPUT
          echo "commit_sha=$COMMIT_SHA" >> $GITHUB_OUTPUT
          echo "deb_url=$DEB_URL" >> $GITHUB_OUTPUT

          if [ "$VERSION" != "$CURRENT" ]; then
            echo "needs_update=true" >> $GITHUB_OUTPUT
          else
            echo "needs_update=false" >> $GITHUB_OUTPUT
          fi

      - name: Check for CLI updates
        id: cli
        run: |
          INSTALL_SCRIPT=$(curl -fsSL "https://cursor.com/install")
          VERSION=$(echo "$INSTALL_SCRIPT" | grep -oP 'downloads\.cursor\.com/lab/\K[^/]+' | head -1)
          DOWNLOAD_URL="https://downloads.cursor.com/lab/${VERSION}/linux/x64/agent-cli-package.tar.gz"

          CURRENT=$(grep 'version = ' package-cli.nix | head -1 | sed 's/.*"\(.*\)".*/\1/')

          echo "current=$CURRENT" >> $GITHUB_OUTPUT
          echo "latest=$VERSION" >> $GITHUB_OUTPUT
          echo "download_url=$DOWNLOAD_URL" >> $GITHUB_OUTPUT

          if [ "$VERSION" != "$CURRENT" ]; then
            echo "needs_update=true" >> $GITHUB_OUTPUT
          else
            echo "needs_update=false" >> $GITHUB_OUTPUT
          fi

      - name: Update GUI package
        if: steps.gui.outputs.needs_update == 'true'
        run: |
          VERSION="${{ steps.gui.outputs.latest }}"
          COMMIT_SHA="${{ steps.gui.outputs.commit_sha }}"
          DEB_URL="${{ steps.gui.outputs.deb_url }}"

          HASH=$(nix-prefetch-url "$DEB_URL" 2>/dev/null)
          SRI_HASH=$(nix hash convert --to sri --hash-algo sha256 "$HASH")

          if [[ ! "$SRI_HASH" =~ ^sha256- ]]; then
            echo "ERROR: Invalid SRI hash: $SRI_HASH"
            exit 1
          fi

          echo "New GUI hash: $SRI_HASH"

          sed -i "s/version = \"[^\"]*\"/version = \"$VERSION\"/" package.nix
          sed -i "s|hash = \"sha256-[^\"]*\"|hash = \"$SRI_HASH\"|" package.nix

          OLD_SHA=$(grep -oP 'production/\K[a-f0-9]{40}' package.nix | head -1)
          sed -i "s|$OLD_SHA|$COMMIT_SHA|" package.nix

          git diff package.nix

      - name: Update CLI package
        if: steps.cli.outputs.needs_update == 'true'
        run: |
          VERSION="${{ steps.cli.outputs.latest }}"
          DOWNLOAD_URL="${{ steps.cli.outputs.download_url }}"

          HASH=$(nix-prefetch-url "$DOWNLOAD_URL" 2>/dev/null)
          SRI_HASH=$(nix hash convert --to sri --hash-algo sha256 "$HASH")

          if [[ ! "$SRI_HASH" =~ ^sha256- ]]; then
            echo "ERROR: Invalid SRI hash: $SRI_HASH"
            exit 1
          fi

          echo "New CLI hash: $SRI_HASH"

          sed -i "s/version = \"[^\"]*\"/version = \"$VERSION\"/" package-cli.nix
          sed -i "s|hash = \"sha256-[^\"]*\"|hash = \"$SRI_HASH\"|" package-cli.nix

          git diff package-cli.nix

      - name: Test build
        if: steps.gui.outputs.needs_update == 'true' || steps.cli.outputs.needs_update == 'true'
        run: |
          nix build .#cursor --accept-flake-config --impure
          nix build .#cursor-cli --accept-flake-config --impure

      - name: Commit and push
        if: steps.gui.outputs.needs_update == 'true' || steps.cli.outputs.needs_update == 'true'
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

          MSG=""
          if [ "${{ steps.gui.outputs.needs_update }}" = "true" ]; then
            MSG="Update cursor to ${{ steps.gui.outputs.latest }}"
          fi
          if [ "${{ steps.cli.outputs.needs_update }}" = "true" ]; then
            if [ -n "$MSG" ]; then
              MSG="$MSG, cursor-cli to ${{ steps.cli.outputs.latest }}"
            else
              MSG="Update cursor-cli to ${{ steps.cli.outputs.latest }}"
            fi
          fi

          if [ "${{ steps.gui.outputs.needs_update }}" = "true" ]; then
            git add package.nix
          fi
          if [ "${{ steps.cli.outputs.needs_update }}" = "true" ]; then
            git add package-cli.nix
          fi

          git commit -m "$MSG"
          git push

      - name: Create Release
        if: steps.gui.outputs.needs_update == 'true'
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          NOTES="Updated cursor from ${{ steps.gui.outputs.current }} to ${{ steps.gui.outputs.latest }}"
          if [ "${{ steps.cli.outputs.needs_update }}" = "true" ]; then
            NOTES="$NOTES\n\nUpdated cursor-cli from ${{ steps.cli.outputs.current }} to ${{ steps.cli.outputs.latest }}"
          fi

          gh release create "v${{ steps.gui.outputs.latest }}" \
            --title "cursor ${{ steps.gui.outputs.latest }}" \
            --notes "$NOTES"
